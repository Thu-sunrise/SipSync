version: "1.0"
services:
  # --- Dịch vụ Backend ---
  - name: sipsync-backend
    type: web
    regions:
      - sin
    instance_type: nano # Tiết kiệm nhất, nằm trong gói miễn phí
    source:
      git:
        workdir: backend
        build_strategy: docker
    ports:
      - port: 8000
        protocol: http
    env:
      - key: PORT
        value: "8000"
      - key: NODE_ENV
        value: "production"
      # Các biến bảo mật (Bạn PHẢI tạo các tên này trong mục Settings -> Secrets của Koyeb trước)
      - key: MONGODB_URI
        secret: MONGO_URI
      - key: REDIS_URL
        secret: REDIS_URL
      - key: OPENAI_API_KEY
        secret: OPENAI_API_KEY
      - key: PAYOS_CLIENT_ID
        secret: PAYOS_CLIENT_ID
      - key: PAYOS_API_KEY
        secret: PAYOS_API_KEY
      - key: PAYOS_CHECKSUM_KEY
        secret: PAYOS_CHECKSUM_KEY
      - key: PAYOS_WEBHOOK_URL
        value: "https://sipsync-backend-thu-sunrise.koyeb.app/webhook/payos"
      - key: TELEGRAM_BOT_TOKEN
        secret: TELEGRAM_BOT_TOKEN
      - key: TELEGRAM_WEBHOOK_TOKEN
        secret: TELEGRAM_WEBHOOK_TOKEN
      - key: JWT_SECRET
        secret: JWT_SECRET
      - key: ADMIN_PASSWORD
        secret: ADMIN_PASSWORD

  # --- Dịch vụ Frontend ---
  - name: sipsync-frontend
    type: web
    regions:
      - sin
    instance_type: nano # Tiết kiệm nhất
    source:
      git:
        workdir: frontend
        build_strategy: docker
    ports:
      - port: 80
        protocol: http
    env:
      - key: VITE_API_URL
        # Thay <tên-user> tương tự như trên
        value: "https://sipsync-backend-<tên-user>.koyeb.app"