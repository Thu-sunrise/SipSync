apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-tunnel-deployment
  namespace: casso-prod
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: cloudflare-tunnel
  template:
    metadata:
      labels:
        app: cloudflare-tunnel
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run 
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: TUNNEL_TOKEN

                



