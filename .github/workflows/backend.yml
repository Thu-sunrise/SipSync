name: Deploy Backend to K3s

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'k8s/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Đóng gói & Đẩy Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: minhthu1704/casso-backend:latest

      - name: 4. Lấy địa chỉ IP của máy ảo Github Actions
        id: get_ip
        run: |
          echo "ipv4=$(curl -s https://ifconfig.me)" >> $GITHUB_OUTPUT

      - name: 5. Xác thực với AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: 6. [MỞ CỔNG 22] Cho phép IP của Github đi qua tường lửa
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get_ip.outputs.ipv4 }}/32

      - name: 7. Copy cấu hình K8s lên EC2 (Chỉ thư mục k8s/prod)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/prod/"
          target: "/home/ec2-user/k8s-configs"
          strip_components: 0

      - name: 8. SSH vào EC2 và ra lệnh deploy cho Kubernetes
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/home/ec2-user/.kube/config
            kubectl apply -f /home/ec2-user/k8s-configs/k8s/prod/
            kubectl rollout restart deployment casso-backend-deployment -n casso-prod

      - name: 9. [ĐÓNG CỔNG 22] Khóa cửa tường lửa ngay lập tức
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get_ip.outputs.ipv4 }}/32

      - name: 10. Đăng ký lại Webhook với Telegram
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
               -H "Content-Type: application/json" \
               -d '{"url": "https://apihub.hubsunrise.me/webhook/telegram", "secret_token": "${{ secrets.TELEGRAM_WEBHOOK_TOKEN }}"}'
