name: Deploy Backend to K3s

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'k8s/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Đóng gói và build image lên Docker hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: minhthu1704/casso-backend:latest

      - name: Lấy địa chỉ ip của máy ảo github action
        id: get_ip
        run: |
          echo "ipv4=$(curl -s https://ifconfig.me)" >> $GITHUB_OUTPUT
        
      - name: Xác thực cấu hình với AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ap-southeast-1

      - name: MỞ CỔNG 22 Cho phép IP của Github đi qua tường lửa
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get_ip.outputs.ipv4 }}/32
      
      - name: SSH into EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Trỏ đường dẫn đến file điều khiển K8s
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # Cập nhật cấu hình mới (nếu có thay đổi trong thư mục k8s)
            cd /home/ec2-user/Casso || true
            git pull origin main || true
            kubectl apply -f k8s/prod/ || true

            # Khởi động lại Backend để thay thế Pod cũ mà không sập hệ thống (Zero-Downtime)
            kubectl rollout restart deployment casso-backend-deployment -n casso-prod
      
      - name: ĐÓNG CỔNG 22 Khóa cửa tường lửa ngay lập tức
        if: always() # Ép buộc bước này phải chạy kể cả khi bước SSH ở trên bị lỗi/thất bại
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get_ip.outputs.ipv4 }}/32

      - name: Register Webhook with telegram
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
               -H "Content-Type: application/json" \
               -d '{"url": "https://apihub.hubsunrise.me/webhook/telegram", "secret_token": "${{ secrets.TELEGRAM_WEBHOOK_TOKEN }}"}'
